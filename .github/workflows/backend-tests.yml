name: Backend tests

on:
  push:
    branches:
      - master
      - feature/secure-admin-reseller-management
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: phase2-test-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot
          --password=phase2-test-root"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      PHASE2_MYSQL_URL: mysql+pymysql://root:phase2-test-root@127.0.0.1:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install backend and test dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<81"
          python -m pip install -r requirements-test.txt

      - name: Run backend tests
        run: python -m pytest -q
